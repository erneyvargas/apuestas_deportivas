name: deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "terraform/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: apuestas-dev-app

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger EC2 redeploy via SSM
        env:
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          IMAGE: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Redeploy ${GITHUB_SHA::7}" \
            --parameters "commands=[
              \"set -eux\",
              \"aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${IMAGE%/*}\",
              \"docker pull ${IMAGE}\",
              \"docker tag ${IMAGE} ${IMAGE%:*}:latest\",
              \"systemctl restart apuestas-app.service\"
            ]" \
            --query Command.CommandId --output text)
          echo "Command ID: $CMD_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"
                exit 1 ;;
            esac
            sleep 10
          done
          echo "Timeout esperando SSM"; exit 1
