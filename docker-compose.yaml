services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: pass134
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build: .
    container_name: apuestas_app
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://root:pass134@mongodb:27017/
    depends_on:
      - mongodb

volumes:
  mongodb_data: